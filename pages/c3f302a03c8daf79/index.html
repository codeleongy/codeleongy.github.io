BfwA+EjrZyWUvpAAAAABJRU5ErkJggg==">自律小建议<!----></h1> <!----> <div class="theme-vdoing-content content__default"><h1 id="自律小建议"><a href="#自律小建议" class="header-anchor">#</a> 自律小建议</h1> <ul><li><strong>培养专注</strong> <ul><li>练习冥想、瑜伽等</li></ul></li> <li><strong>排除外界干扰</strong> <ul><li>手机调到勿扰，在图书馆学习等</li></ul></li></ul> <ul><li><p><strong>规定学习时间</strong></p> <ul><li><p><a href="https://baike.baidu.com/item/%E7%95%AA%E8%8C%84%E5%B7%A5%E4%BD%9C%E6%B3%95/6353502?fr=aladdin" target="_blank" rel="noopener noreferrer"><strong>番茄时间管理</strong><span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>——使用番茄时间管理法，选择一个待完成的任务，将番茄时间设为25分钟，专注工作，中途不允许做任何与该任务无关的事，直到番茄时钟响起，然后短暂休息一下（5分钟就行），每4个番茄时段多休息一会儿。</p> <blockquote><p>人的大脑在记忆一个东西的时候，有短期记忆和长期记忆之分。大脑编码内容进行长期记忆，需要一个过程的，可能是几个小时或几天，集中练习就给不了这个过程，所以集中练习带来的效果是短期记忆，而进行间隔练习，大脑则有时间进行充分的编码，学习到的知识就会储存为长期记忆。</p> <p>推荐几种间歇锻炼方法：体能训练、课间操、眼保操、拉伸训练...</p> <p>有好的身体可以使大脑更清醒哟~</p></blockquote></li></ul></li> <li><p><strong>限制娱乐时间</strong></p> <ul><li><p>减少使用娱乐app的时间（苹果手机可设定屏幕使用时间）</p></li> <li><p>推荐观看&gt;<a href="https://www.bilibili.com/video/av47180907" target="_blank" rel="noopener noreferrer">B站某位UP主的视频《每天只看半小时手机，坚持一周后我有哪些变化？》<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p></li></ul></li> <li><p><strong>戒网瘾（特别是游戏）</strong></p> <ul><li>除了手机、游戏以外，周围有很多美好的事物值得我们去关注。</li></ul></li> <li><p><strong>设定目标</strong></p> <ul><li>想要更好的薪水和职位？多花点时间在学习上吧~</li> <li>潜意识暗示自己，建立信心，让自己变得更优秀，然后去挑战更高的目标</li></ul></li> <li><p><strong>优秀的人仍在不断努力</strong></p> <ul><li>且看大神 <a href="https://github.com/ruanyf" target="_blank" rel="noopener noreferrer">阮一峰github<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a> 提交记录</li></ul></li></ul></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/codeleongy/edit/master/docs/03.更多/01.学习/04.自律小建议.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <!----> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2022/08/13, 22:11:00</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/99
