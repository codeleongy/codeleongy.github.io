</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><ul><li>可以按个人需求选择版本，这里我选择16.x</li></ul> <h4 id="在centos上安装node-js"><a href="#在centos上安装node-js" class="header-anchor">#</a> <strong>在CentOS上安装Node.js.</strong></h4> <div class="language-bash line-numbers-mode"><pre class="language-bash"><code>  yum <span class="token function">install</span> nodejs
