"author iconfont icon-touxiang" data-v-06225672><a href="https://github.com/xugaoyi" target="_blank" title="作者" class="beLink" data-v-06225672>xugaoyi</a></div> <div title="创建时间" class="date iconfont icon-riqi" data-v-06225672><a href="javascript:;" data-v-06225672>2020-05-24</a></div> <!----></div></div></div> <!----> <div class="content-wrapper"><div class="right-menu-wrapper"><div class="right-menu-margin"><div class="right-menu-title">目录</div> <div class="right-menu-content"></div></div></div> <h1><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAB4AAAAeCAYAAAA7MK6iAAAAAXNSR0IArs4c6QAABKFJREFUSA3tVl1oFVcQnrMbrak3QUgkya1akpJYcrUtIqW1JvFBE9LiQ5v6JmJpolbMg32rVrhgoYK0QiMY6i9Y6EMaW5D+xFJaTYItIuK2Kr3+BJNwkxBj05sQY3b3nM6cs2dv9t7NT/vQJw/sndk5M/PNzJkzewGerP+pAmy+ON8lLzUJgA8ZYxYIYZmGYRnctDaWvJJAmTtfP1pvXsBCCPP8QFcCaRkZYACgDZFO4stNIcBCajEOlmmC9XpJ9bAGCaPaPmzPl32dvLSVu3BWCTQs0XQQ6g0DYgwLIoAZbBCdW/i+781o1VVlm/410mw4h06Y7bIPHNyWDyL4FHkX03Q8SrzNhZTZriieckWt7cL6MM85YcLpsi/7O9/iXFT6MswI0DmmpkSaJ0qLxFIm3+i1THHB3zmBH3PYx9CcykcLOeQVVa7QtdxTgQgEleX2AjHYfwA+2ddV77ruGoJUbhGDI09YSNXyMpUt5ylOzxgbUmtOp7NmbNt8v3arjTBfYELmLUV+M+nSawNNAUqpT3ClJWg5I3BLT+cGW/DXNGCa6tx1aakCGEigArTn4TDIPdrXXYKCZNrHLMCOEPvHBlLQ99s9eHB7EB6NTki73CVPQ2F5MSx/uRQixfmq7rK0wYD8w8E905bnPDfwoWs/rfv93NWN/ZfvwsLIU7A09gxECyISeGJkHAau98L97tuw7NXnoPyNF8FcYGLGKsOs0mN3OEyec9esGW/ZEl945dTP34wlR2FZVQWU1q0Cw8Tr7p+hgLLNL0FPxx/Q35mA8aEUrH6nCgwEl0tn7wUiZYJnNRh6DK4UH/k0lfyrsBKdPVv/AriGIQcEDQZ65LBAGe2Rzui9Ybjz7XUppz1/uKBbyVPGkN3ZAeC6hr0x7Nr38N5+EqkoOm17xpoqR9ohQF55ERSvr4Dkr3chNfC3DMzGJlNBElW8w9nsGQvhNGIzDkXzCg8cLK951xHsFBlTJspJNi3ZFIMF2AeDV3q8DNOB+YHi6QTrChDIWDBRi5U5f+ZMfJLu3ccrqxtdxk4SKH336LFxSmkqefwU5T8fhdSdQf9IVKD6aNiwI/hnmcAZ91isYMJIaCUCx9W098+LgruikeTqzqqxKPUwqJyCPJiyemVVZBOijDGjD38Os0jOiSPL1z3SPjXNANbiNPXAdzTfukjjuknNBbyz3nwgTd3AVFqUJ5hpHlq9MveLnWwttUfoygBmvVjuikxND3znrhsELnZk7k+OjIGxeNEkomyLVta0xxn+HZhjBc4YZ/AFjHjz9u3xRZl2BN4aq9nFwWh16IrQ1aHHEd3j1+4/dB9OtH4e29A2H1DyHQRmOSfQZ1Fy7MHBTGB6J/Djq6p3OxyO2cB+4Car7v/o3GXgfAkj23+x9ID1Teoamo/SXcbvSf2PX7Vc8DdCmE1vN9di+32P9/5YR3vLnhCVGUWBjEkr3yh4H8v9CzmsbdhzOKzsJKM90iFdaTMjRPhGVsakRvOaRidljo6H6G7j+ctrJpsP+4COhDIl0La2+FS4+5mlocBaXY5QnGZysIBYoeSsl5qQzrSj/cgNrfuEzlWBfwA+EjrZyWUvpAAAAABJRU5ErkJggg==">搜索引擎使用技巧<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>搜索引擎相信大家经常在使用，但是有时候想搜某个信息时却搜出来一大堆不相关的（百度：你们都在看我干什么？）。下面我们来介绍几种搜索技巧，可以提升搜索效率，助你快速查资料，妈妈再也不担心我的学习了（'妈~我真的是在找学习资料'）</p> <h3 id="技巧1-排除干扰项"><a href="#技巧1-排除干扰项" class="header-anchor">#</a> 技巧1：排除干扰项</h3> <p><strong>方式</strong>：关键词1+空格+减号+关键词2，即 <code>关键词1 -关键词2</code></p> <p><strong>功能</strong>：排除一些不想要的关键词</p> <p><strong>示例</strong>：</p> <div class="language- line-numbers-mode"><pre class="language-text"><code>锤子 -锤子手机
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>示例中将在搜索结果排除与<code>锤子手机</code>相关的，只显示<code>锤子</code>本来的样子。</p> <blockquote><p>经过百度搜索的测试，有的关键词能排除掉，有的并不好使</p></blockquote> <h3 id="技巧2-精确搜索"><a href="#技巧2-精确搜索" class="header-anchor">#</a> 技巧2：精确搜索</h3> <p><strong>方式</strong>：给关键词加双引号，<code>&quot;关键词&quot;</code></p> <p><strong>功能</strong>：只搜索引号里的字，少一个字或者把字拆开都不行</p> <p><strong>示例</strong>：</p> <div class="language- line-numbers-mode"><pre class="language-text"><code>&quot;达拉不崩吧&quot;
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><blockquote><p>注意是英文的双引号</p></blockquote> <h3 id="技巧3-指定网站内搜索"><a href="#技巧3-指定网站内搜索" class="header-anchor">#</a> 技巧3：指定网站内搜索</h3> <p><strong>方式</strong>：<code>site:域名 关键词</code></p> <p><strong>功能</strong>：只搜索指定域名的内容</p> <p><strong>示例</strong>：</p> <div class="language- line-numbers-mode"><pre class="language-text"><code>site:zhihu.com 前端
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>有一些站内自带的搜索并不好用，可以尝试这个搜索技巧。</p> <h3 id="技巧4-指定文件格式"><a href="#技巧4-指定文件格式" class="header-anchor">#</a> 技巧4：指定文件格式</h3> <p><strong>方式</strong>：<code>filetype:文件格式 关键词</code></p> <p><strong>示例</strong>：</p> <div class="language- line-numbers-mode"><pre class="language-text"><code>filetype:avi 你懂的
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>常见文件格式有<code>doc</code>、<code>pdf</code>、<code>ppt</code>等</p> <h3 id="技巧5-指定在标题搜索"><a href="#技巧5-指定在标题搜索" class="header-anchor">#</a> 技巧5：指定在标题搜索</h3> <p><strong>方式</strong>：<code>intitle:关键词</code></p> <p><strong>功能</strong>：搜索的关键词要出现在标题当中</p> <h3 id="技巧6-指定在内容中搜索"><a href="#技巧6-指定在内容中搜索" class="header-anchor">#</a> 技巧6：指定在内容中搜索</h3> <p><strong>方式</strong>：<code>intext:关键词</code>、<code>allintext:关键词1 关键词2</code>、<code>inurl:关键词2</code></p> <h3 id="技巧7-多种搜索技巧叠加使用"><a href="#技巧7-多种搜索技巧叠加使用" class="header-anchor">#</a> 技巧7：多种搜索技巧叠加使用</h3> <p><strong>示例</strong>：</p> <div class="language- line-numbers-mode"><pre class="language-text"><code>site:zhihu.com 前端 intitle:js
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>多种技巧和关键词叠加使用，中间空格隔开。</p> <h3 id="注意事项"><a href="#注意事项" class="header-anchor">#</a> 注意事项</h3> <p>以上搜索技巧使用的符号均是英文符号。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/codeleongy/edit/master/docs/03.更多/01.学习/10.搜索引擎使用技巧.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E6%90%9C%E7%B4%A2%E6%8A%80%E5%B7%A7" title="标签">#搜索技巧</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2022/08/13, 22:11:00</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/9ba2b8fb13de1957/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">处理问题的思路</div></a> <a href="/pages/aea6571b7a8bae86/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">面试问题集锦</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
